<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Light and dark mode support through CSS variables or currentColor -->
  </defs>
  <style>
    .node { fill: currentColor; }
    .edge { stroke: currentColor; stroke-width: 2; opacity: 0.3; }
    .highlight { stroke: #0d8a8a; stroke-width: 3; opacity: 0.6; }
    @media (prefers-color-scheme: dark) {
      .highlight { stroke: #2dd4bf; }
    }
  </style>
  <g transform="translate(100, 100)">
    <!-- Edges -->
    <line class="edge" x1="-40" y1="-50" x2="0" y2="-20" />
    <line class="edge" x1="40" y1="-50" x2="0" y2="-20" />
    <line class="edge" x1="-60" y1="10" x2="-40" y2="-50" />
    <line class="edge" x1="60" y1="10" x2="40" y2="-50" />
    <line class="highlight" x1="-60" y1="10" x2="0" y2="40" />
    <line class="highlight" x1="60" y1="10" x2="0" y2="40" />
    <line class="edge" x1="-40" y1="-50" x2="60" y2="10" />
    <line class="edge" x1="40" y1="-50" x2="-60" y2="10" />
    <line class="edge" x1="0" y1="-20" x2="0" y2="40" />

    <!-- Nodes -->
    <circle class="node" cx="-40" cy="-50" r="6" />
    <circle class="node" cx="40" cy="-50" r="6" />
    <circle class="node" cx="-60" cy="10" r="8" />
    <circle class="node" cx="60" cy="10" r="8" />
    <circle class="node" cx="0" cy="-20" r="10" />
    <circle class="node" cx="0" cy="40" r="12" />
  </g>
</svg>
